server:
  port: 8080

spring:
  application:
    name: springboot-auth-starter

  datasource:
    url: jdbc:mysql://localhost:3306/auth_demo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

jwt:
  secret: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong123456
  expiration: 86400000

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.security: DEBUG
